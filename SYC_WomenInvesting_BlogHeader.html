<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women & Investing — Blog Feed Header</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:100%; font-family:'Source Sans 3',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:#002C4F; }
  .header-wrap {
    padding: 32px 24px 28px;
    text-align: center;
    background: #002C4F;
  }
  .eyebrow {
    display: inline-block;
    background: #AEC000;
    color: #002C4F;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .1em;
    border-radius: 4px; padding: 3px 12px;
    margin-bottom: 14px;
  }
  h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px; font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 10px; line-height: 1.2;
  }
  h2 span { color: #AEC000; }
  .subtitle {
    font-size: 14px; color: rgba(255,255,255,0.75);
    line-height: 1.6; max-width: 560px;
    margin: 0 auto 18px; font-weight: 300;
  }
  .accent-line {
    width: 48px; height: 3px;
    background: #AEC000;
    border-radius: 2px; margin: 0 auto;
  }
</style>
</head>
<body>
<div class="header-wrap">
  <div class="eyebrow">Women &amp; Investing</div>
  <h2>Blogs &amp; <span>Explainers</span></h2>
  <p class="subtitle">All our Women &amp; Investing content in one place — blogs, deep dives, and practical guides written specifically for women at every stage of the investing journey.</p>
  <div class="accent-line"></div>
</div>
<script>
function resizeParent() {
  try { window.parent.postMessage({ type:'iwh', value: document.body.scrollHeight + 10 }, '*'); } catch(e) {}
}
resizeParent();
setTimeout(resizeParent, 500);
</script>
</body>
</html>
